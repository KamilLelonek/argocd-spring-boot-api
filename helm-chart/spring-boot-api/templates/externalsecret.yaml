apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "spring-boot-api.fullname" . }}
  labels:
    {{- include "spring-boot-api.labels" . | nindent 4 }}
  annotations:
    # Sync wave 0: applied first, before the Deployment (wave 1).
    # ArgoCD waits for this resource to reach Healthy status before proceeding.
    # ESO sets ExternalSecret to Healthy only after it has successfully pulled
    # from AWS SM and written the target Kubernetes Secret. This breaks the
    # race condition where pods start before their Secret exists.
    argocd.argoproj.io/sync-wave: "0"
spec:
  # Polling interval for AWS SM changes. Lower = more AWS API calls = higher cost.
  # ESO updates the K8s Secret within this interval, but running pods do NOT pick up
  # new env vars automatically - environment variables are snapshotted at pod start.
  # To apply rotated secrets: kubectl rollout restart deployment/<name> -n spring-boot-api
  # For immediate ESO sync (before rollout): kubectl annotate externalsecret <name> \
  #   force-sync=$(date +%s) --overwrite
  refreshInterval: 1h

  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: ClusterSecretStore

  target:
    name: {{ include "spring-boot-api.fullname" . }}
    # creationPolicy omitted: Owner is the ESO default - Secret is deleted with ExternalSecret.
    # Set explicitly only if you need Merge (add to existing Secret) or None (no cleanup).

  # dataFrom.extract: pulls all key-value pairs from a single JSON secret in AWS SM.
  # Avoids listing each key individually - new keys in AWS SM are picked up automatically
  # within refreshInterval without any Helm chart changes.
  #
  # Expected AWS SM secret format at secretPath:
  # { "APP_SECRET_KEY": "...", "DB_PASSWORD": "...", "JWT_SECRET": "..." }
  dataFrom:
    - extract:
        key: {{ .Values.secretStore.secretPath }}
