apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "spring-boot-api.fullname" . }}
  labels:
    {{- include "spring-boot-api.labels" . | nindent 4 }}
data:
  # Key name matches the desired filename inside the pod (config.json).
  # The `|` YAML block scalar preserves newlines - required for multi-line
  # values like JSON. Using `|-` would strip the trailing newline, which is
  # fine for JSON but `|` is safer and more explicit.
  config.json: |
    {
      "app": {
        "name": "spring-boot-api",
        "profile": "{{ .Values.springProfile }}"
      },
      "server": {
        "port": 8080
      },
      "logging": {
        "level": "INFO"
      }
    }
