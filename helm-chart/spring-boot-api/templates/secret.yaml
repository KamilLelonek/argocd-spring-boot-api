apiVersion: v1
kind: Secret
metadata:
  name: {{ include "spring-boot-api.fullname" . }}
  labels:
    {{- include "spring-boot-api.labels" . | nindent 4 }}
  annotations:
    # Sync wave 0: Deployment (wave 1) waits for this Secret to exist before
    # pods start. Without ordering, pods fail with CreateContainerConfigError
    # if this Secret has not been applied yet in the same sync.
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
data:
  # randAlphaNum N generates a cryptographically random alphanumeric string of
  # length N. b64enc base64-encodes it (required for Secret data values).
  #
  # DISADVANTAGE - re-evaluated on every `helm upgrade`:
  # Even with no changes to chart or values, each upgrade produces a new random
  # value, changes the Secret, and (via the checksum annotation in deployment.yaml)
  # triggers a rolling restart. Deploys stop being no-ops; every push rotates
  # app credentials. In production, use a secrets manager (e.g. AWS Secrets
  # Manager + External Secrets Operator) so that rotation is explicit and
  # controlled, values never touch Git or Helm release history, and upgrades
  # are idempotent.
  #
  # Partial workaround with lookup:
  #   {{- $existing := lookup "v1" "Secret" .Release.Namespace (include "spring-boot-api.fullname" .) }}
  #   APP_SECRET_KEY: {{ if $existing }}{{ index $existing.data "APP_SECRET_KEY" | quote }}{{ else }}{{ randAlphaNum 32 | b64enc | quote }}{{ end }}
  # This reuses the existing value on upgrades but fails during `helm template`
  # (no cluster access), so CI dry-runs always generate fresh values anyway.
  APP_SECRET_KEY: {{ randAlphaNum 32 | b64enc | quote }}
  DB_PASSWORD:    {{ randAlphaNum 32 | b64enc | quote }}
  JWT_SECRET:     {{ randAlphaNum 32 | b64enc | quote }}
