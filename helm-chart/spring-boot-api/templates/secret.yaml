apiVersion: v1
kind: Secret
metadata:
  name: {{ include "spring-boot-api.fullname" . }}
  labels:
    {{- include "spring-boot-api.labels" . | nindent 4 }}
  annotations:
    # Sync wave 0: Deployment (wave 1) waits for this Secret to exist before
    # pods start. Without ordering, pods fail with CreateContainerConfigError
    # if this Secret has not been applied yet in the same sync.
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
data:
  # lookup reads the current Secret from the cluster (if it exists) so that
  # values are preserved across upgrades. dig "data" returns an empty map when
  # the Secret does not exist yet (first install). index then returns nil for
  # each missing key, and default generates a fresh random value only in that case.
  #
  # REMAINING DISADVANTAGES vs a secrets manager:
  # - `helm template` has no cluster access, so CI dry-runs always generate fresh
  #   values (lookup returns {}). The rendered output cannot be applied directly.
  # - Secret values live in Helm release history (stored as Kubernetes Secrets in
  #   the same namespace). Anyone with `kubectl get secret` on the release history
  #   can decode them.
  # - No audit trail: there is no record of when a value was rotated or by whom.
  # - Rotation requires a manual delete of the Secret to force regeneration, or
  #   an out-of-band patch - there is no built-in rotation mechanism.
  {{- $existing := lookup "v1" "Secret" .Release.Namespace (include "spring-boot-api.fullname" .) }}
  {{- $data := dig "data" dict $existing }}
  APP_SECRET_KEY: {{ index $data "APP_SECRET_KEY" | default (randAlphaNum 32 | b64enc) | quote }}
  DB_PASSWORD:    {{ index $data "DB_PASSWORD"    | default (randAlphaNum 32 | b64enc) | quote }}
  JWT_SECRET:     {{ index $data "JWT_SECRET"     | default (randAlphaNum 32 | b64enc) | quote }}
