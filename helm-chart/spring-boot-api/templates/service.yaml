apiVersion: v1
kind: Service
metadata:
  name: {{ include "spring-boot-api.fullname" . }}
  labels:
    {{- include "spring-boot-api.labels" . | nindent 4 }}
spec:
  # ClusterIP: internal-only. External access goes through Ingress.
  type: ClusterIP
  selector:
    {{- include "spring-boot-api.selectorLabels" . | nindent 4 }}
  ports:
    # targetPort references containerPort by name, not number.
    # If the port number changes in the Deployment, this Service stays correct
    # as long as the containerPort name stays the same. Numeric targetPort
    # would silently route to the wrong port after a renumber.
    - name: api
      port: 8080
      targetPort: api
    - name: logs
      port: 8081
      targetPort: logs
    - name: soap
      port: 8082
      targetPort: soap
