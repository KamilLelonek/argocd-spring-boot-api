# Default values - overridden per environment in environments/{env}/values.yaml

image:
  repository: busybox
  tag: stable
  # Always: correct policy for mutable tags like `stable` or `latest`.
  # IfNotPresent would cache the old image on a node indefinitely even if
  # the tag now points to a newer digest. Always forces a registry check
  # on every pod start. Use IfNotPresent only with immutable tags (e.g. SHAs).
  pullPolicy: Always

# Overridden per environment: 3 (dev) / 5 (prd)
replicaCount: 1

# Spring profile passed as container arg. Required; set per environment.
springProfile: ""

ingress:
  className: nginx
  host: ""  # Required; set per environment
  tls:
    # secretName: cert-manager writes the issued cert into this Secret.
    # nginx-ingress reads it for TLS termination. Leave empty to disable TLS.
    secretName: ""
    # clusterIssuer: name of the cert-manager ClusterIssuer that signs the cert.
    # Set to letsencrypt-staging (dev) or letsencrypt-prod (prd).
    # Leave empty if managing certs externally (pre-provisioned Secret).
    clusterIssuer: ""

secretStore:
  name: aws-secrets-manager
  secretPath: ""  # Required; set per environment

# PodDisruptionBudget: governs voluntary disruptions (node drains, cluster upgrades).
# Uses maxUnavailable rather than minAvailable: minAvailable:1 + replicaCount:1
# allows 0 evictions and hangs node drains indefinitely. maxUnavailable:1 is
# always safe - at most 1 pod evicted regardless of replica count.
pdb:
  maxUnavailable: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
