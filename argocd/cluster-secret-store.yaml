# ClusterSecretStore is a cluster-level infrastructure resource managed by the platform
# team, not per-application. It defines HOW ESO authenticates with AWS Secrets Manager.
# All applications in the cluster reference it by name.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-central-1
      auth:
        # JWT (IRSA - IAM Roles for Service Accounts): the recommended auth method
        # for EKS. ESO exchanges the pod's ServiceAccount JWT token for temporary
        # AWS credentials via STS AssumeRoleWithWebIdentity.
        # No long-lived AWS access keys stored in the cluster.
        jwt:
          serviceAccountRef:
            # ESO's own ServiceAccount in its own namespace, NOT the app's SA.
            # The IRSA role ARN is injected by Terraform at ESO install time.
            name: external-secrets
            namespace: external-secrets
